spring.application.name=planes-de-trabajo-service

# ============================================
# CONSUL SERVICE DISCOVERY - ACTIVADO
# ============================================
spring.config.import=optional:consul:
spring.cloud.consul.enabled=true
spring.cloud.consul.config.enabled=false
spring.cloud.consul.config.import-check.enabled=false
spring.cloud.consul.discovery.enabled=true

# Configuración de Consul
spring.cloud.consul.host=${CONSUL_HOST}
spring.cloud.consul.port=${CONSUL_PORT}
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${random.value}
spring.cloud.consul.discovery.health-check-path=${server.servlet.context-path}/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.service-name=planes-de-trabajo-service

# ==============================================
# BASE DE DATOS - Variables de entorno
# ==============================================
spring.datasource.url=jdbc:postgresql://${DB_PLANES_HOST}:${DB_PLANES_PORT}/${DB_PLANES_NAME}
spring.datasource.username=${DB_PLANES_USERNAME}
spring.datasource.password=${DB_PLANES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ==============================================
# SERVIDOR
# ==============================================
server.port=${PLANES_TRABAJO_PORT}
server.servlet.context-path=/planes-de-trabajo

# Deshabilitar DevTools para evitar conflictos con el puerto
spring.devtools.add-properties=false

# ==============================================
# DOCUMENTACIÓN API
# ==============================================
springdoc.swagger-ui.path=/general-planes-de-trabajo/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.api.version=1.0.0
springdoc.api.title=API Modulo General Planes de Trabajo Universidad Mariana.
springdoc.api.description=API para la gestion de planes de trabajo en la Universidad Mariana.

# ==============================================
# MANAGEMENT ENDPOINTS
# ==============================================
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health

# ==============================================
# LOGGING - DEBUG
# ==============================================
logging.level.root=INFO
logging.level.com.unimar.planes_de_trabajo=DEBUG

# ==============================================
# RABBITMQ - Bus de eventos para tiempo real
# ==============================================
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST}
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%t] %-40.40logger{39} : %m%n